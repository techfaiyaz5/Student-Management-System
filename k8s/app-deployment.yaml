apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: student-app
  template:
    metadata:
      labels:
        app: student-app
    spec:
      containers:
      - name: student-app
        image: techfaiyaz5/student-app:latest
        imagePullPolicy: Always  # Har baar fresh image pull karega
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          value: "db-service"
        - name: DB_USER
          value: "root"
        - name: DB_PASSWORD
          value: "password" 
        - name: DB_NAME
          value: "student_db"
---
apiVersion: v1
kind: Service
metadata:
  name: student-app-service
spec:
  type: LoadBalancer 
  selector:
    app: student-app
  ports:
    - protocol: TCP
      port: 80         
      targetPort: 8080 
      nodePort: 30001  # <--- Port hamesha ke liye lock ho gaya